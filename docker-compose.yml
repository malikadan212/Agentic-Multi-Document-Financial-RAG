# ============================================
# DOCKER COMPOSE FOR MULTIMODAL RAG FINANCIAL ANALYSIS SYSTEM
# ============================================
# Run with: docker-compose up --build
# Access at: http://localhost:8501
# ============================================

services:
  # Main Multimodal RAG Application
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-rag-multimodal
    ports:
      - "8501:8501"
    environment:
      # LLM API Keys - Set in .env file or pass directly
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      # Application Settings
      - PYTHONPATH=/app:/app/src
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Hugging Face cache settings
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
    volumes:
      # Mount data directory for document uploads (read-write)
      - ./data:/app/data
      # Mount chunk_metadata for pre-loaded data.
      # Read-write so `scripts/build_kg.py` can persist `kg.pkl` here. The pre-existing
      # FAISS index and chunk_metadata.json are not modified at runtime by the app.
      - ./chunk_metadata:/app/chunk_metadata
      # Mount .env file for API keys
      - ./.env:/app/.env:ro
      # Mount config file (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Mount cache directory for model persistence
      - rag-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - rag-network
    # Resource limits (adjust based on your system).
    # NOTE: Bumped from 4G -> 8G after observing exit-code-137 (OOM kills) during
    # ingestion of long PDFs (e.g. 92-page banking T&Cs with table extraction).
    # The app's resident set already holds: sentence-transformers + transformers
    # + torch (CPU) + OpenCLIP + Tesseract + spaCy/NetworkX (KG) + FAISS index
    # + Streamlit. Steady-state is ~2.5–3 GB; PDF ingestion can transiently add
    # 2–3 GB more. 8G provides comfortable headroom; 4G consistently OOM'd.
    #
    # CPU: pdfplumber's table extractor is single-threaded and pure-Python
    # (GIL-bound). The processor.py pipeline now fans long PDFs out across
    # processes — it autodetects the container's CPU affinity and uses up
    # to 8 workers. Make sure the container can actually see those cores.
    # Sized for a 4-CPU host: cap at 3.0 so the host OS / Docker daemon /
    # WSL2 still has a core. Bump these if you move to a beefier machine
    # (the parallel page workers in processor.py will scale automatically).
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '3.0'
        reservations:
          memory: 4G
          cpus: '1.0'
    # Larger /dev/shm so multiprocessing.Queue (used internally by
    # ProcessPoolExecutor on Linux for IPC) has room for table results
    # passed back from workers on long PDFs.
    shm_size: '512mb'

# Named volume for model cache persistence
volumes:
  rag-cache:
    driver: local

networks:
  rag-network:
    driver: bridge

# ============================================
# USAGE:
# 1. Set GROQ_API_KEY in .env file (required)
# 2. Optional: Set other API keys for different LLM providers
# 3. Run: docker-compose up --build
# 4. Wait for models to download (first run takes longer)
# 5. Access: http://localhost:8501
# 6. Upload documents or use pre-loaded data
#
# FEATURES:
# - Multimodal: Select "Groq Vision" provider for image analysis
# - Streaming: Enable real-time answer generation
# - PDF Export: Download Q&A reports as PDF
# - Analytics: View query statistics and trends
# - Follow-ups: Click suggested follow-up questions
# ============================================
