# ============================================
# DOCKER COMPOSE FOR MULTIMODAL RAG FINANCIAL ANALYSIS SYSTEM
# ============================================
# Run with: docker-compose up --build
# Access at: http://localhost:8501
# ============================================

services:
  # Main Multimodal RAG Application
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-rag-multimodal
    ports:
      - "8501:8501"
    environment:
      # LLM API Keys - Set in .env file or pass directly
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      # Application Settings
      - PYTHONPATH=/app:/app/src
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Hugging Face cache settings
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
    volumes:
      # Mount data directory for document uploads (read-write)
      - ./data:/app/data
      # Mount chunk_metadata for pre-loaded data (read-only)
      - ./chunk_metadata:/app/chunk_metadata:ro
      # Mount .env file for API keys
      - ./.env:/app/.env:ro
      # Mount config file (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Mount cache directory for model persistence
      - rag-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - rag-network
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

# Named volume for model cache persistence
volumes:
  rag-cache:
    driver: local

networks:
  rag-network:
    driver: bridge

# ============================================
# USAGE:
# 1. Set GROQ_API_KEY in .env file (required)
# 2. Optional: Set other API keys for different LLM providers
# 3. Run: docker-compose up --build
# 4. Wait for models to download (first run takes longer)
# 5. Access: http://localhost:8501
# 6. Upload documents or use pre-loaded data
#
# FEATURES:
# - Multimodal: Select "Groq Vision" provider for image analysis
# - Streaming: Enable real-time answer generation
# - PDF Export: Download Q&A reports as PDF
# - Analytics: View query statistics and trends
# - Follow-ups: Click suggested follow-up questions
# ============================================
